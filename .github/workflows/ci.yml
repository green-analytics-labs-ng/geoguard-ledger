name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  contract-lint-test:
    name: Contract - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/geoguard-ledger
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/geoguard-ledger/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/geoguard-ledger/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Run tests
        run: cargo test --verbose

  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: geoguard
          POSTGRES_PASSWORD: geoguard_dev
          POSTGRES_DB: geoguard_ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check with ruff
        run: uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy app/

      - name: Check migrations match models
        run: |
          uv run alembic upgrade head
          uv run alembic revision --autogenerate -m "ci-check"
          # Fail if autogenerate produced a new migration (models drifted from latest migration)
          git diff --exit-code -- alembic/versions/
        env:
          DATABASE_URL: postgresql+asyncpg://geoguard:geoguard_dev@localhost:5432/geoguard_ledger

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=xml

  frontend-lint-test:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

  all-pass:
    name: All Checks Pass
    needs: [contract-lint-test, backend-lint-test, frontend-lint-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All checks passed"
